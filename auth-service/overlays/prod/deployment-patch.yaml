apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  template:
    spec:
      containers:
        - name: auth-service
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres.postgres:5432/auth_prod
            - name: SPRING_DATASOURCE_USERNAME
              value: auth_prod
