apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: llama-server
  namespace: llama-server
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - name: llama-server-tls
      allowedRoutes:
        namespaces:
          from: All
