apiVersion: v1
kind: PersistentVolume
metadata:
  name: llama-models
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-models
  local:
    path: /opt/models/huggingface
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: feature.node.kubernetes.io/pci-10de.present
              operator: In
              values:
                - "true"
