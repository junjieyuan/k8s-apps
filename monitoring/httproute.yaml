apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: llama-server
      namespace: llama-server
  hostnames:
    - "${GATEWAY_HOST}"
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
